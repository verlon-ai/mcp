name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Version lockstep check
        run: |
          PKG=$(node -p "require('./package.json').version")
          SRV=$(node -p "require('./server.json').version")
          SRV_PKG=$(node -p "require('./server.json').packages[0].version")
          TS=$(grep -oE "VERLON_MCP_VERSION = '[^']+'" src/server.ts | grep -oE "[0-9]+\.[0-9]+\.[0-9]+")
          echo "package.json=$PKG server.json=$SRV server.json.packages[0]=$SRV_PKG server.ts=$TS"
          [ "$PKG" = "$SRV" ] && [ "$PKG" = "$SRV_PKG" ] && [ "$PKG" = "$TS" ] || { echo "::error::version drift between package.json / server.json / server.ts"; exit 1; }

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
